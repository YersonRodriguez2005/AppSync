<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 1. IDENTIDAD Y SEO BÁSICO -->
    <title>AppSync | Tienda Personalizada & Showcase de Software</title>
    <meta
      name="description"
      content="Explora, analiza y descarga aplicaciones exclusivas y seguras de alto rendimiento. Showcase de software independiente bajo diseño moderno Glassmorphism y Soft UI."
    />
    <meta
      name="keywords"
      content="AppSync, Tienda de Apps, Software, Android, Windows, Web Apps, Desarrollo, Portafolio, Glassmorphism, Neumorfismo"
    />
    <meta name="author" content="Creador Principal - AppSync" />
    <meta name="robots" content="index, follow" />

    <!-- 2. CAMPO PARA LOS ÍCONOS DE LA PÁGINA (FAVICONS) -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- Ícono alternativo para navegadores antiguos -->
    <link rel="alternate icon" href="/favicon.ico" />
    <!-- Ícono para cuando un usuario guarda tu página en la pantalla de inicio de su iPhone/iPad -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Color de la barra de estado en móviles Android -->
    <meta name="theme-color" content="#3B82F6" />

    <!-- 3. OPEN GRAPH (Tarjetas para WhatsApp, LinkedIn, Facebook) -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="AppSync | Tienda Personalizada & Showcase de Software"
    />
    <meta
      property="og:description"
      content="Descarga software libre de ruido visual, moderno y seguro. Ecosistema de aplicaciones diseñado bajo arquitectura limpia y fluida."
    />
    <meta property="og:site_name" content="AppSync Store" />
    <!-- Cuando despliegues en Vercel, cambia esta URL por la oficial de tu dominio: -->
    <meta property="og:url" content="https://appsync.vercel.app" />
    <!-- IMAGEN DE PREVISUALIZACIÓN SOCIAL: Coloca una imagen de 1200x630px en tu carpeta /public y enlázala aquí: -->
    <meta property="og:image" content="/social-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- 4. TWITTER CARDS (Previsualización en X / Twitter y Discord) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="AppSync | Tienda Personalizada & Showcase de Software"
    />
    <meta
      name="twitter:description"
      content="Explora y descarga mis aplicaciones exclusivas en un entorno seguro y de alta ingeniería."
    />
    <meta name="twitter:image" content="/social-cover.png" />

    <!-- 5. FUENTES DEL SISTEMA / OPTIMIZACIÓN DE RENDERIZADO -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Si deseas una fuente tipográfica como Inter o Plus Jakarta Sans, puedes pegar su enlace oficial de Google Fonts aquí -->
  </head>
  <body
    class="bg-[#F0F4F8] dark:bg-[#0B1120] text-slate-900 dark:text-slate-50 transition-colors duration-300"
  >
    <!-- Contenedor principal donde React montará toda nuestra interfaz -->
    <div id="root"></div>

    <!-- Script de entrada de Vite -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
